<main class="monitor-shell">
  <section class="monitor-panel" *ngIf="dashboardStats$ | async as stats; else loading">
    <div class="panel-content">
      <div class="title-row" data-tauri-drag-region (mousedown)="startDrag($event)">
        <button class="minimize-btn" (click)="minimizeWindow()" (mousedown)="$event.stopPropagation()">
          <span class="minimize-icon"></span>
        </button>
        <button class="close-btn" (click)="closeWindow()" (mousedown)="$event.stopPropagation()">
          <span class="close-icon"></span>
        </button>
        <h1>HARRIS SYS-GHOST MONITOR</h1>
      </div>

      <div class="stats-layout">
        <article class="stat-card">
          <span class="label">CPU Usage</span>
          <strong>{{ stats.cpuUsage | number: "1.1-1" }}%</strong>
          <div class="meter">
            <div class="meter-fill" [style.width.%]="stats.cpuUsage"></div>
          </div>
        </article>

        <article class="stat-card">
          <span class="label">Memory Used</span>
          <strong>{{ stats.memoryUsedGb | number: "1.2-2" }} GB</strong>
          <div class="meter">
            <div class="meter-fill" [style.width.%]="stats.memoryUsagePercent"></div>
          </div>
        </article>

        <article class="stat-card">
          <span class="label">Memory Usage</span>
          <strong>{{ stats.memoryUsagePercent | number: "1.1-1" }}%</strong>
        </article>

        <article class="stat-card">
          <span class="label">Net Download</span>
          <strong>{{ stats.networkDownloadMbps | number: "1.2-2" }} MB/s</strong>
        </article>
      </div>
    </div>
  </section>

  <ng-template #loading>
    <section class="monitor-panel loading-state">
      <p>Waiting for backend stats...</p>
    </section>
  </ng-template>

  <router-outlet />
</main>
